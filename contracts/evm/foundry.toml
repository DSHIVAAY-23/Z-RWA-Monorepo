[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# Fuse Spark Testnet Configuration
[rpc_endpoints]
fuse_spark = "https://rpc.fusespark.io"

[etherscan]
fuse_spark = { key = "${FUSESCAN_API_KEY}", chain = 123, url = "https://explorer.fusespark.io/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
